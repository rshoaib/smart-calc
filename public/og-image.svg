<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#10b981" opacity="0.05"/>
  <circle cx="1100" cy="530" r="250" fill="#06b6d4" opacity="0.05"/>
  <circle cx="900" cy="80" r="120" fill="#8b5cf6" opacity="0.04"/>

  <!-- Grid lines for tech feel -->
  <line x1="0" y1="200" x2="1200" y2="200" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="430" x2="1200" y2="430" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#334155" stroke-width="0.5" opacity="0.3"/>

  <!-- Calculator icon -->
  <g transform="translate(540, 160)">
    <rect x="0" y="0" width="120" height="140" rx="16" fill="none" stroke="url(#accent)" stroke-width="3"/>
    <rect x="15" y="15" width="90" height="35" rx="6" fill="#10b981" opacity="0.2"/>
    <rect x="15" y="65" width="25" height="20" rx="4" fill="#10b981" opacity="0.3"/>
    <rect x="48" y="65" width="25" height="20" rx="4" fill="#10b981" opacity="0.3"/>
    <rect x="80" y="65" width="25" height="20" rx="4" fill="#06b6d4" opacity="0.3"/>
    <rect x="15" y="95" width="25" height="20" rx="4" fill="#10b981" opacity="0.3"/>
    <rect x="48" y="95" width="25" height="20" rx="4" fill="#10b981" opacity="0.3"/>
    <rect x="80" y="95" width="25" height="20" rx="4" fill="#06b6d4" opacity="0.3"/>
  </g>

  <!-- SmartCalc text -->
  <text x="600" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">
    Smart<tspan fill="#10b981">Calc</tspan>
  </text>

  <!-- Subtitle -->
  <text x="600" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#94a3b8" text-anchor="middle">
    Free Finance &amp; Health Calculators
  </text>

  <!-- Domain -->
  <text x="600" y="480" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#64748b" text-anchor="middle">
    dailysmartcalc.com
  </text>

  <!-- Bottom accent bar -->
  <rect x="0" y="615" width="1200" height="15" fill="url(#accent)"/>

  <!-- Feature badges -->
  <g transform="translate(280, 520)">
    <rect x="0" y="0" width="140" height="36" rx="18" fill="#10b981" opacity="0.15"/>
    <text x="70" y="23" font-family="system-ui, sans-serif" font-size="13" fill="#10b981" text-anchor="middle" font-weight="600">💰 Finance</text>
  </g>
  <g transform="translate(450, 520)">
    <rect x="0" y="0" width="140" height="36" rx="18" fill="#ef4444" opacity="0.15"/>
    <text x="70" y="23" font-family="system-ui, sans-serif" font-size="13" fill="#f87171" text-anchor="middle" font-weight="600">❤️ Health</text>
  </g>
  <g transform="translate(620, 520)">
    <rect x="0" y="0" width="140" height="36" rx="18" fill="#8b5cf6" opacity="0.15"/>
    <text x="70" y="23" font-family="system-ui, sans-serif" font-size="13" fill="#a78bfa" text-anchor="middle" font-weight="600">📊 Productivity</text>
  </g>
  <g transform="translate(790, 520)">
    <rect x="0" y="0" width="140" height="36" rx="18" fill="#06b6d4" opacity="0.15"/>
    <text x="70" y="23" font-family="system-ui, sans-serif" font-size="13" fill="#22d3ee" text-anchor="middle" font-weight="600">✨ 100% Free</text>
  </g>
</svg>
